 name: .NET API CI/CD Pipeline
 on:
   push:
     branches:
       - '**'
   pull_request:
     branches:
       - '**'
   workflow_dispatch:
 jobs:
   build-and-deploy:
     uses: ./.github/workflows/app-dispatcher.yml
     with:
       nome_projeto: dotnet-api
       nome_csproj: 'projeto de API em .NET' #informar apenas o nome sem o csproj
       nome_csproj_tests: 'projeto de testes' #informar apenas o nome sem o csproj
       nome_imagem: 'dotnet-api' #nome da imagem a ser gerada (sem tag)
       porta_pod: 80 #porta exposta pelo pod no Kubernetes definir conforme a aplicação, geralmente 80 ou qualquer outra porta configurada no container da aplicação


